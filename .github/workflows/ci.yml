name: Hermes CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Build + full smoke suite on Linux (Ubuntu)
  # Provides T0 evidence (pipeline correct) and partial T1 (PSI available on
  # GitHub-hosted runners running kernel 5.15+ with cgroup v2).
  # -------------------------------------------------------------------------
  build-and-smoke-linux:
    name: Build & Smoke (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential python3 stress-ng

      - name: Check PSI availability
        run: |
          echo "=== Kernel PSI support ==="
          cat /proc/pressure/cpu  && echo "CPU PSI: OK"  || echo "CPU PSI: unavailable"
          cat /proc/pressure/memory && echo "MEM PSI: OK" || echo "MEM PSI: unavailable"
          cat /proc/pressure/io  && echo "IO PSI:  OK"  || echo "IO PSI:  unavailable"
          uname -r

      - name: CMake configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build all targets
        run: |
          cmake --build build --parallel $(nproc)

      - name: Verify all binaries exist
        run: |
          for bin in hermesd hermesd_mt hermesctl hermes_replay hermes_reeval \
                     hermes_synth hermes_fault hermes_eval hermes_bench \
                     hermes_report hermes_compare hermes_simulate hermes_alert hermes_web; do
            test -x build/$bin && echo "OK  $bin" || { echo "MISSING $bin"; exit 1; }
          done

      - name: Run full WSL2 smoke suite
        run: |
          bash scripts/smoke_wsl2.sh ci-smoke-${{ github.run_number }} artifacts build
        env:
          HERMES_RUNTIME_MODE: observe-only

      - name: Run schema validation smoke
        run: bash scripts/smoke_schema.sh

      - name: Run hermes_simulate smoke
        run: |
          # Generate a synthetic fixture, then simulate it through the pipeline.
          build/hermes_synth ci-synth-${{ github.run_number }}
          SYNTH_DIR=$(ls -dt artifacts/logs/ci-synth-* | head -1)
          build/hermes_simulate "$SYNTH_DIR/samples.ndjson" \
            --out artifacts/logs/ci-sim-${{ github.run_number }} \
            --compare "$SYNTH_DIR"
          echo "hermes_simulate: OK"

      - name: Run hermes_diff.py smoke
        run: |
          python3 scripts/hermes_diff.py \
            config/schema_tier_b.yaml \
            config/schema_tier_c.yaml \
            --show-unchanged | head -40
          echo "hermes_diff: OK"

      - name: Run hermes_fault fixtures
        run: |
          for scenario in vram_spike mem_storm cpu_hog io_storm \
                          mixed_pressure oom_imminent recovery_resume gpu_contention; do
            build/hermes_fault --scenario $scenario
            echo "hermes_fault --scenario $scenario: OK"
          done

      - name: Run hermes_reeval state coverage
        run: |
          SYNTH_DIR=$(ls -dt artifacts/logs/ci-synth-* | head -1)
          build/hermes_reeval "$SYNTH_DIR"
          test -f "$SYNTH_DIR/state_coverage.json" && echo "state_coverage.json: OK"

      - name: Run hermes_eval
        run: |
          SYNTH_DIR=$(ls -dt artifacts/logs/ci-synth-* | head -1)
          build/hermes_eval "$SYNTH_DIR" && echo "hermes_eval: OK" || echo "hermes_eval: no predictions (expected for synth)"

      - name: Run hermes_plot.py --summary
        run: |
          SYNTH_DIR=$(ls -dt artifacts/logs/ci-synth-* | head -1)
          python3 scripts/hermes_plot.py "$SYNTH_DIR" --summary
          echo "hermes_plot: OK"

      - name: Run hermesctl headroom
        run: |
          build/hermesctl headroom --ups 30.0 && echo "headroom OK=30" || true
          build/hermesctl headroom --ups 75.0 && echo "headroom DENY=75" || true

      - name: Run check_evidence_tiers.py
        run: |
          python3 scripts/check_evidence_tiers.py || true

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-smoke-artifacts-${{ github.run_number }}
          path: artifacts/
          retention-days: 7

  # -------------------------------------------------------------------------
  # Job 2: Python script validation
  # -------------------------------------------------------------------------
  python-scripts:
    name: Python Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check all Python scripts
        run: |
          for f in scripts/*.py; do
            python3 -m py_compile "$f" && echo "OK  $f" || { echo "FAIL $f"; exit 1; }
          done

      - name: hermes_diff.py — Tier A vs B
        run: |
          python3 scripts/hermes_diff.py \
            config/schema_tier_a.yaml config/schema_tier_b.yaml

      - name: hermes_diff.py — Tier B vs C
        run: |
          python3 scripts/hermes_diff.py \
            config/schema_tier_b.yaml config/schema_tier_c.yaml

      - name: hermes_diff.py — JSON output
        run: |
          python3 scripts/hermes_diff.py \
            config/schema_tier_b.yaml config/schema_tier_c.yaml \
            --json | python3 -m json.tool > /dev/null && echo "JSON output: valid"

      - name: hermes_tune.py — no-data path
        run: |
          python3 scripts/hermes_tune.py --help 2>/dev/null || true
          echo "hermes_tune: import OK"

  # -------------------------------------------------------------------------
  # Job 3: Schema validation
  # -------------------------------------------------------------------------
  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all schema YAML files
        run: |
          for cfg in config/schema.yaml config/schema_tier_a.yaml \
                     config/schema_tier_b.yaml config/schema_tier_c.yaml; do
            echo "Validating $cfg..."
            bash scripts/smoke_schema.sh "$cfg" && echo "OK  $cfg" || echo "WARN $cfg (smoke_schema may need build)"
          done
