# Hermes Control Plane Configuration
# This file configures thresholds, weights, and enabled control levels.

version: 1

ups_weights:
  cpu_some: 0.20
  mem_some: 0.175
  mem_full: 0.175  # Mem weights sum to 0.35
  gpu_util: 0.15
  vram_used: 0.30

thresholds:
  ups:
    elevated: 40
    critical: 70
  mem_psi:
    elevated_full_avg10: 2.0
    critical_full_avg10: 5.0
  vram:
    high_pct: 90
    critical_pct: 95
  predictor:
    high_risk: 0.70

cooldowns:
  level_1_pid_sec: 15
  level_2_pid_sec: 20
  level_3_global_sec: 300
  recovery_hysteresis_sec: 10

actions:
  enable_level_1: true
  enable_level_2: false
  enable_level_3: false
  observe_only_mode: true

# Multi-GPU placement and attribution policy.
# These fields are read by NvmlBackend and process_mapper.
# They have no effect on single-GPU hosts.
multi_gpu:
  # How to aggregate VRAM pressure across devices when computing UPS:
  #   sum    — total used VRAM across all GPUs (default; most conservative)
  #   max    — worst-case single-device fill percentage
  #   mean   — average fill across devices (least sensitive)
  vram_aggregation: sum

  # Whether process_mapper should merge per-PID VRAM across all GPUs.
  # true  = a process using 2 GB on each of 2 GPUs counts as 4 GB total (default).
  # false = only the GPU with the highest usage per PID is counted.
  per_pid_vram_merge: true

  # Device indices to include in monitoring (empty = all devices).
  # Example: [0, 1]  monitors only devices 0 and 1 on a 4-GPU host.
  device_allowlist: []

  # If true, Hermes will prefer to throttle/kill processes on the GPU device
  # with the highest current utilisation rather than picking the highest-VRAM
  # consumer globally.  Experimental — leave false until T4 evidence exists.
  placement_aware_kills: false
